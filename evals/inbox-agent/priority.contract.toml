# Emit contract for the inbox-agent priority span (wave-5 multi-step E1).
contract_version = 0
task = "inbox-agent"

[scope]
type = "span"
kind = "model_call"
name = "priority"

[interface]
input = "json"
output = "text"

[[example]]
name = "urgent-billing"
match = "exact"
input = { ticket = "I was charged twice for my subscription this month, please refund the duplicate payment." }
output = "urgent"

[[example]]
name = "normal-feature"
match = "exact"
input = { ticket = "Please add support for exporting reports directly to Google Sheets." }
output = "normal"

[[property]]
kind = "one_of"
target = "output"
values = ["low", "normal", "urgent"]

[budgets]
max_latency_ms_p95 = 30000
