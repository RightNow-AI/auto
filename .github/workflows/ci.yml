name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FLATC_VERSION: "25.12.19"
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain README: use @master as the revision when passing an
      # explicit `toolchain` input instead of @rev
      - name: install rust (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy
          # auto-passes build.rs nested-builds the dsl interpreter for wasm
          targets: wasm32-unknown-unknown

      # build.rs requires flatc == the flatbuffers crate version (see ADR-0001)
      - name: install flatc (pinned, official release binary)
        run: |
          curl -sSL -o /tmp/flatc.zip "https://github.com/google/flatbuffers/releases/download/v${FLATC_VERSION}/Linux.flatc.binary.clang++-18.zip"
          unzip -o /tmp/flatc.zip -d /tmp/flatc
          sudo install -m 755 /tmp/flatc/flatc /usr/local/bin/flatc
          flatc --version

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install pytest
      - name: sdk tests
        working-directory: sdk/python
        run: python -m pytest tests -q

  typescript-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: sdk tests
        working-directory: sdk/typescript
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain README: use @master as the revision when passing an
      # explicit `toolchain` input instead of @rev
      - name: install rust (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.1"
          targets: wasm32-unknown-unknown

      - name: install flatc (pinned, official release binary)
        run: |
          curl -sSL -o /tmp/flatc.zip "https://github.com/google/flatbuffers/releases/download/v${FLATC_VERSION}/Linux.flatc.binary.clang++-18.zip"
          unzip -o /tmp/flatc.zip -d /tmp/flatc
          sudo install -m 755 /tmp/flatc/flatc /usr/local/bin/flatc
          flatc --version

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: install trainer deps
        run: python -m pip install scikit-learn

      - name: build cli
        run: cargo build -p auto-cli

      - name: toy-agent e2e (record, report, verify, compile, synthesize, run, block)
        run: bash evals/toy-agent/e2e.sh

      - name: distill-agent e2e (extraction refuses, distill through the same gate)
        run: PYTHON_BIN=python bash evals/distill-agent/e2e.sh

      - name: serve-proxy e2e (loopback sockets only — guarded serving, 409 abstention, recording proxy vs a labeled fake upstream)
        run: PYTHON_BIN=python bash evals/serve-proxy/e2e.sh

      - name: pipeline-agent e2e (region compilation — a 3-span chain to one pipeline artifact through the unchanged gate)
        run: PYTHON_BIN=python bash evals/pipeline-agent/e2e.sh

      - name: daemon e2e (the ratchet as a service — deopt, ingest, auto-recompile, publish, tier-1; plus the conformal guard flag)
        run: PYTHON_BIN=python bash evals/daemon/e2e.sh

      - name: tool-agent e2e (capability imports — a tool-calling chain compiled to an auto.tool_call artifact; hermetic gate replay, --tool live runs, toolless refusal)
        run: PYTHON_BIN=python bash evals/tool-agent/e2e.sh

      - name: registry-remote e2e (ADR-0022 — serve a root over loopback HTTP, push, pull into a fresh root, verify by id + signature, tamper -> pull refuses)
        run: PYTHON_BIN=python bash evals/registry-remote/e2e.sh
