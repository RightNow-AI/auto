# embedded — OPTIONAL packaging workflow (the ADR-0024 / ADR-0026 wheels+CI
# follow-ups). Proves the two in-process embeddings are buildable by strangers
# on every merge:
#
#   embedded-python — auto-py abi3 wheel (maturin) + pip install + import smoke
#   embedded-node   — auto-node napi addon (@napi-rs/cli 3 via the npm `build`
#                     script in crates/auto-node) + require() smoke
#
# OPTIONAL BY CONVENTION: this workflow is deliberately NOT a required check —
# ci.yml carries the correctness gates, which need no Python/Node toolchain
# (the pyo3/napi FFI is feature-gated off there). The jobs here are NOT
# continue-on-error: when they run, a red job is a real packaging regression,
# not noise.
#
# Network: package registries only (crates.io, PyPI, npm) plus the pinned
# flatc release binary from github.com/google/flatbuffers — the same set
# ci.yml already uses. No secrets are read.

name: embedded

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FLATC_VERSION: "25.12.19"
  CARGO_TERM_COLOR: always

jobs:
  embedded-python:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain README: use @master as the revision when passing an
      # explicit `toolchain` input instead of @rev
      - name: install rust (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.1"

      # auto-ir (in the dep tree via auto-backend/auto-runtime) requires
      # flatc == the flatbuffers crate version (see ADR-0001)
      - name: install flatc (pinned, official release binary)
        run: |
          curl -sSL -o /tmp/flatc.zip "https://github.com/google/flatbuffers/releases/download/v${FLATC_VERSION}/Linux.flatc.binary.clang++-18.zip"
          unzip -o /tmp/flatc.zip -d /tmp/flatc
          sudo install -m 755 /tmp/flatc/flatc /usr/local/bin/flatc
          flatc --version

      - uses: Swatinem/rust-cache@v2

      # 3.10 = the abi3-py310 floor (ADR-0024): the wheel is built against the
      # stable ABI and smoke-imported on the OLDEST interpreter it claims.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - run: python -m pip install maturin

      - name: build abi3 wheel
        run: maturin build --release -m crates/auto-py/Cargo.toml

      - name: install wheel + import smoke
        run: |
          python -m pip install --no-index --no-deps --force-reinstall target/wheels/auto_py-*.whl
          python -c "import auto_py; v = auto_py.version(); assert v, 'version() empty'; print('auto_py', v)"

  embedded-node:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain README: use @master as the revision when passing an
      # explicit `toolchain` input instead of @rev
      - name: install rust (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.1"

      # auto-ir (in the dep tree via auto-backend/auto-runtime) requires
      # flatc == the flatbuffers crate version (see ADR-0001)
      - name: install flatc (pinned, official release binary)
        run: |
          curl -sSL -o /tmp/flatc.zip "https://github.com/google/flatbuffers/releases/download/v${FLATC_VERSION}/Linux.flatc.binary.clang++-18.zip"
          unzip -o /tmp/flatc.zip -d /tmp/flatc
          sudo install -m 755 /tmp/flatc/flatc /usr/local/bin/flatc
          flatc --version

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      # the checked-in npm script: @napi-rs/cli 3 (pinned via npx) builds the
      # cdylib with --features node and copies it to crates/auto-node/
      # auto_node.node; the generated typedef is redirected into target/ so it
      # never clobbers the hand-written index.d.ts
      - name: build addon
        working-directory: crates/auto-node
        run: npm run build

      # load the addon in-process; assert version() answers and a missing
      # artifact refuses with the frozen code (ADR-0026 error contract)
      - name: require smoke
        run: |
          node -e '
            const m = require("./crates/auto-node/auto_node.node");
            const v = m.version();
            if (!v) throw new Error("version() empty");
            console.log("auto_node", v);
            try { new m.Runner("does-not-exist.cbin"); throw new Error("unreachable"); }
            catch (e) { if (e.code !== "AutoError") throw e; }
            console.log("missing artifact refused with code AutoError");
          '
